[tools]
go = "1.26.4"
node = "24"
bun = "1.3.14"

[tasks.setup]
description = "Install tool versions and project dependencies"
run = [
  "mise --no-config install --quiet go@1.26.4 node@24 bun@1.3.14",
  "go mod download",
  "bun install --cwd frontend",
  "go run github.com/wailsapp/wails/v2/cmd/wails version",
]

[tasks.local]
description = "Build and open the app"
run = [
  "go run github.com/wailsapp/wails/v2/cmd/wails build",
  "open build/bin/ccusage-ui.app",
]

[tasks.dev]
description = "Run Wails development server"
run = "go run github.com/wailsapp/wails/v2/cmd/wails dev"

[tasks.build]
description = "Build the Wails app"
run = "go run github.com/wailsapp/wails/v2/cmd/wails build"

[tasks.test]
description = "Run Go tests"
run = "go test ./..."

[tasks.frontend-build]
description = "Build the frontend"
run = "bun run --cwd frontend build"

[tasks.destroy-db]
description = "Delete the local project index database"
run = "rm -f \"$HOME/Library/Caches/ccusage-ui/usage-index.sqlite\"*"
